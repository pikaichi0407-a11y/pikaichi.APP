<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5C6BC0" />
  <title>スタンプ取得 - ARスタンプラリー</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* このページ固有のスタイル */
    .confetti-area {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .stamp-seal {
      position: relative;
      display: inline-block;
    }
    .stamp-seal::after {
      content: '✓';
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: #4CAF50;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="app-header">
    <h1>&#127381; スタンプ取得</h1>
  </header>

  <!-- 紙吹雪エリア（スタンプ新規取得時に表示） -->
  <div class="confetti-area" id="confetti-area"></div>

  <main class="page-container">

    <!-- エラー表示（無効なIDなどの場合） -->
    <div id="stamp-error" class="error-box hidden">
      <p>&#9888;&#65039; 無効なQRコードです。</p>
      <p style="font-size:0.85rem;margin-top:8px;">スポットに設置されたQRコードを読み取ってください。</p>
      <a href="index.html" class="btn-primary" style="margin-top:16px;display:inline-block;padding:10px 24px;">
        ホームへ戻る
      </a>
    </div>

    <!-- スタンプ詳細コンテンツ（JS で表示） -->
    <div id="stamp-content" class="hidden">

      <!-- スタンプアイコン＋ステータス -->
      <div class="stamp-detail">
        <div class="stamp-seal">
          <div id="stamp-icon" class="stamp-detail-icon">?</div>
        </div>
        <div id="stamp-status" class="stamp-status"></div>
        <h2 id="stamp-name">スタンプ名</h2>
        <p id="stamp-subtitle" class="stamp-detail-sub">サブタイトル</p>
        <p id="stamp-description" class="stamp-detail-desc">説明文</p>

        <!-- キャラクターを見るボタン -->
        <a id="btn-view-ar" href="#" class="btn-primary">
          &#127876; キャラクターを見る
        </a>

        <!-- ホームへ -->
        <a href="index.html" class="btn-secondary">
          &#127381; スタンプ帳を見る
        </a>
      </div>

      <!-- コンプリートバナー（全取得時に表示） -->
      <div id="complete-banner" class="complete-banner hidden">
        <h2>&#127881; コンプリート！</h2>
        <p>全5つのスタンプを集めました！おめでとうございます！</p>
      </div>

    </div>

    <!-- ローディング表示 -->
    <div id="stamp-loading" class="text-center" style="padding:40px;color:var(--text-sub);">
      <p>読み込み中...</p>
    </div>

  </main>

  <script src="js/stamps-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loading = document.getElementById('stamp-loading');
      if (loading) loading.classList.add('hidden');

      handleStampCollection();

      // 新規取得時に紙吹雪を飛ばす
      const status = document.getElementById('stamp-status');
      if (status && status.classList.contains('new')) {
        launchConfetti();
      }
    });

    function launchConfetti() {
      const area = document.getElementById('confetti-area');
      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A8E6CF', '#C9B1FF', '#FF7043', '#5C6BC0'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = Math.random() * 0.8 + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        area.appendChild(piece);
      }
      // 3秒後に紙吹雪を削除
      setTimeout(() => { area.innerHTML = ''; }, 4000);
    }
  </script>
</body>
</html>

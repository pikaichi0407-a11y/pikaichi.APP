<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>AR体験 - ARスタンプラリー</title>

  <!--
    A-Frame: 3D/VRシーン描画
    AR.js:   カメラトラッキング（マーカーベースAR）

    注意: AR.js は HTTPS（または localhost）環境でのみ動作します。
         本番デプロイ後は HTTPS URL で確認してください。
  -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* AR画面はフルスクリーン */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* A-Frameシーンを全画面に */
    a-scene {
      width: 100vw;
      height: 100vh;
    }

    /* エラーオーバーレイ */
    #ar-error {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      color: white;
      text-align: center;
      padding: 40px 24px;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    #ar-error.show {
      display: flex;
    }
    #ar-error h2 { font-size: 1.2rem; }
    #ar-error p  { font-size: 0.9rem; opacity: 0.85; line-height: 1.6; }
    #ar-error a  {
      margin-top: 16px;
      background: white;
      color: #5C6BC0;
      border-radius: 999px;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 1rem;
      display: inline-block;
    }

    /* 下部オーバーレイ（操作案内） */
    #ar-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      color: white;
      padding: 24px 16px 40px;
      text-align: center;
      z-index: 1000;
      pointer-events: none;
    }
    #ar-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    #ar-hint {
      font-size: 0.82rem;
      opacity: 0.85;
    }

    /* 戻るボタン（左上） */
    #ar-back {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 16px;
      background: rgba(0,0,0,0.55);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      z-index: 1000;
      pointer-events: auto;
      backdrop-filter: blur(4px);
    }

    /* マーカーガイドモーダル */
    #marker-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
      color: white;
      text-align: center;
    }
    #marker-modal h2 { font-size: 1.2rem; }
    #marker-modal p  { font-size: 0.88rem; opacity: 0.85; line-height: 1.6; }
    #marker-modal img {
      width: 200px;
      height: 200px;
      border: 3px solid white;
      border-radius: 12px;
    }
    #marker-modal .btn-start {
      margin-top: 8px;
      background: #5C6BC0;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }

    /* ローディング表示 */
    #ar-loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 1500;
      text-align: center;
      padding: 24px;
    }
    #ar-loading p { font-size: 0.9rem; opacity: 0.8; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ローディング画面 -->
  <div id="ar-loading">
    <div class="spinner"></div>
    <p>ARを準備中...</p>
  </div>

  <!-- マーカーガイドモーダル（AR開始前に表示） -->
  <div id="marker-modal" class="hidden" style="display:none;">
    <h2>&#128247; ARの使い方</h2>
    <p>
      以下の<strong>Hiroマーカー</strong>を印刷するか<br>
      画面に表示して、カメラを向けてください。<br>
      キャラクターが浮かび上がります！
    </p>
    <!--
      Hiro マーカー画像。
      本番運用ではローカルにコピーして使用することを推奨。
      印刷用: https://github.com/AR-js-org/AR.js/blob/master/data/images/hiro.png
    -->
    <img
      src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
      alt="Hiroマーカー"
      onerror="this.style.display='none'"
    />
    <p style="font-size:0.78rem;opacity:0.7;">
      &#9888;&#65039; カメラの使用許可を求められたら「許可」を選んでください。
    </p>
    <button class="btn-start" id="btn-start-ar">ARを開始する &#9654;&#65039;</button>
  </div>

  <!-- エラー表示 -->
  <div id="ar-error">
    <h2>&#9888;&#65039; エラー</h2>
    <p id="ar-error-msg">無効なスタンプIDです。スタンプ帳から開いてください。</p>
    <a href="index.html">スタンプ帳へ戻る</a>
  </div>

  <!-- 下部操作案内オーバーレイ -->
  <div id="ar-overlay" class="hidden">
    <p id="ar-title">キャラクター名</p>
    <p id="ar-hint">Hiroマーカーにカメラを向けてください</p>
  </div>

  <!-- 戻るボタン -->
  <a id="ar-back" href="index.html" class="hidden">&#8592; 戻る</a>

  <!--
    A-Frame シーン
    embedded: UIを非表示にしてブラウザに埋め込む
    arjs: AR.js 設定
      - sourceType: webcam でカメラを使用
      - debugUIEnabled: false でデバッグUIを非表示
  -->
  <a-scene
    id="ar-scene"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    vr-mode-ui="enabled: false"
    style="display:none;"
  >

    <!--
      アセット（事前読み込み）
      id="char-model" は JS から動的にパスをセットする
    -->
    <a-assets timeout="10000">
      <a-asset-item id="char-model" src=""></a-asset-item>
    </a-assets>

    <!--
      Hiro マーカー上にキャラクターを表示するエンティティ
      preset="hiro" で標準の Hiro マーカーを使用
    -->
    <a-marker preset="hiro">
      <!--
        3D キャラクター
        - gltf-model: #char-model でアセットを参照
        - scale / position / rotation は app.js の stamp 設定に従う
        - animation: Y軸を中心にゆっくり回転させてリッチに見せる
      -->
      <a-entity
        id="ar-character"
        gltf-model="#char-model"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear;"
      ></a-entity>

      <!-- マーカー検知中に表示するシンプルな光る円 -->
      <a-circle
        color="#5C6BC0"
        opacity="0.3"
        radius="0.6"
        rotation="-90 0 0"
        position="0 0.01 0"
      ></a-circle>
    </a-marker>

    <!-- ARカメラ -->
    <a-entity camera></a-entity>

  </a-scene>

  <script src="js/stamps-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ---- 初期化 ----
    document.addEventListener('DOMContentLoaded', () => {
      const id = getStampIdFromURL();
      const errorEl = document.getElementById('ar-error');
      const errorMsg = document.getElementById('ar-error-msg');
      const loading = document.getElementById('ar-loading');
      const modal = document.getElementById('marker-modal');

      // スタンプIDが無効
      if (!id || !getStampById(id)) {
        loading.style.display = 'none';
        errorEl.classList.add('show');
        return;
      }

      // 未取得チェック
      if (!isStampCollected(id)) {
        loading.style.display = 'none';
        if (errorMsg) errorMsg.textContent = 'このスタンプはまだ取得されていません。QRコードをスキャンしてください。';
        errorEl.classList.add('show');
        return;
      }

      // ローディング終了 → マーカーガイド表示
      setTimeout(() => {
        loading.style.display = 'none';
        modal.style.display = 'flex';
      }, 800);

      // 「ARを開始する」ボタン
      document.getElementById('btn-start-ar').addEventListener('click', () => {
        modal.style.display = 'none';
        startAR(id);
      });
    });

    // ---- AR開始 ----
    function startAR(id) {
      const scene = document.getElementById('ar-scene');
      const overlay = document.getElementById('ar-overlay');
      const backBtn = document.getElementById('ar-back');

      scene.style.display = 'block';
      overlay.classList.remove('hidden');
      backBtn.classList.remove('hidden');

      // A-Frame シーンが初期化されてからモデルをセット
      if (scene.hasLoaded) {
        applyModel(id);
      } else {
        scene.addEventListener('loaded', () => applyModel(id));
      }
    }

    function applyModel(id) {
      const stamp = getStampById(id);
      if (!stamp) return;

      // アセットのsrcを動的に変更
      const assetItem = document.getElementById('char-model');
      if (assetItem) assetItem.setAttribute('src', stamp.model);

      // エンティティにモデルと変形を適用
      const charEl = document.getElementById('ar-character');
      if (charEl) {
        charEl.setAttribute('gltf-model', '#char-model');
        charEl.setAttribute('scale', stamp.modelScale);
        charEl.setAttribute('position', stamp.modelPosition);
        charEl.setAttribute('rotation', stamp.modelRotation);
      }

      // 下部の名前表示
      const titleEl = document.getElementById('ar-title');
      if (titleEl) titleEl.textContent = `${stamp.emoji} ${stamp.name}`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>AR体験 - ARスタンプラリー</title>

  <!--
    A-Frame 1.4.2  : 3D/VRシーン描画
    AR.js 3.x      : カメラ + マーカートラッキング
    ※ AR.js は HTTPS（または localhost）のみ動作
  -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #000;
      overflow: hidden;
    }

    a-scene { width: 100vw; height: 100vh; }

    /* ── ローディング ── */
    #ar-loading {
      position: fixed; inset: 0;
      background: #0d0d1a;
      color: white;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 1500; text-align: center; padding: 24px;
    }
    #ar-loading p { font-size: 0.9rem; opacity: 0.75; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── マーカーガイドモーダル ── */
    #marker-modal {
      position: fixed; inset: 0;
      background: rgba(10,10,26,0.94);
      z-index: 2000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px; gap: 14px;
      color: white; text-align: center;
    }
    #marker-modal.hidden { display: none; }

    .modal-shape-preview {
      width: 100px; height: 100px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
    }
    #marker-modal h2 { font-size: 1.2rem; font-weight: 700; }
    #marker-modal .modal-sub {
      font-size: 0.82rem; opacity: 0.7; line-height: 1.65;
    }
    #marker-modal .shape-hint {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.8rem;
      opacity: 0.85;
    }
    #marker-modal img.hiro-img {
      width: 180px; height: 180px;
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 12px;
    }
    #btn-start-ar {
      background: #5C6BC0;
      color: white; border: none;
      border-radius: 999px;
      padding: 14px 0; font-size: 1rem; font-weight: 700;
      cursor: pointer; width: 100%; max-width: 320px;
      box-shadow: 0 4px 20px rgba(92,107,192,0.5);
      transition: background 0.2s;
    }
    #btn-start-ar:active { background: #3949AB; }

    /* ── エラー ── */
    #ar-error {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      color: white; text-align: center;
      padding: 40px 24px; z-index: 9999;
      display: none;
      flex-direction: column; justify-content: center;
      align-items: center; gap: 12px;
    }
    #ar-error.show { display: flex; }
    #ar-error h2 { font-size: 1.2rem; }
    #ar-error p  { font-size: 0.88rem; opacity: 0.8; line-height: 1.6; }
    #ar-error a  {
      margin-top: 16px; background: white; color: #5C6BC0;
      border-radius: 999px; padding: 12px 28px;
      font-weight: 700; font-size: 1rem; display: inline-block;
    }

    /* ── 下部オーバーレイ ── */
    #ar-overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white; padding: 24px 16px 44px;
      text-align: center; z-index: 1000; pointer-events: none;
    }
    #ar-overlay.hidden { display: none; }
    #ar-title  { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    #ar-hint   { font-size: 0.8rem; opacity: 0.8; margin-bottom: 6px; }
    #ar-shape-label {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.72rem;
      opacity: 0.85;
    }

    /* ── 戻るボタン ── */
    #ar-back {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.9rem; font-weight: 700;
      z-index: 1000; pointer-events: auto;
      backdrop-filter: blur(6px);
      text-decoration: none;
    }
    #ar-back.hidden { display: none; }

    /* ── マーカー未検出インジケーター ── */
    #scanning-indicator {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: 14px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.72rem;
      z-index: 1000;
      display: flex; align-items: center; gap: 6px;
      backdrop-filter: blur(6px);
    }
    #scanning-indicator.hidden { display: none; }
    .scan-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #FF6B6B;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .scan-dot.found { background: #4CAF50; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }
  </style>
</head>
<body>

<!-- ローディング -->
<div id="ar-loading">
  <div class="spinner"></div>
  <p>ARを準備しています…</p>
</div>

<!-- マーカーガイドモーダル -->
<div id="marker-modal" class="hidden">
  <div id="modal-shape-icon" class="modal-shape-preview"></div>
  <h2 id="modal-title">キャラクターをARで見る</h2>
  <p class="modal-sub">
    以下の <strong>Hiroマーカー</strong> を印刷するか、<br>
    別の画面に表示して、カメラを向けてください。
  </p>
  <img
    class="hiro-img"
    src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
    alt="Hiroマーカー"
    onerror="this.style.display='none'"
  />
  <p class="shape-hint" id="modal-shape-hint">仮オブジェクト表示中（.glb未配置）</p>
  <p class="modal-sub" style="font-size:0.76rem;">
    ⚠️ カメラの許可を求められたら「許可」を選んでください。<br>
    iOSは Safari、AndroidはChromeで開いてください。
  </p>
  <button id="btn-start-ar">ARを開始する ▶</button>
</div>

<!-- エラー -->
<div id="ar-error">
  <h2>⚠️ エラー</h2>
  <p id="ar-error-msg">無効なスタンプIDです。スタンプ帳から開いてください。</p>
  <a href="index.html">スタンプ帳へ戻る</a>
</div>

<!-- 下部ヒント（AR起動後） -->
<div id="ar-overlay" class="hidden">
  <p id="ar-title">スポット名</p>
  <p id="ar-hint">Hiroマーカーにカメラを向けてください</p>
  <span id="ar-shape-label"></span>
</div>

<!-- 戻るボタン -->
<a id="ar-back" href="index.html" class="hidden">← 戻る</a>

<!-- スキャンインジケーター -->
<div id="scanning-indicator" class="hidden">
  <div class="scan-dot" id="scan-dot"></div>
  <span id="scan-text">マーカーを探しています</span>
</div>

<!--
  A-Frame シーン
  ・embedded        : ブラウザUIを非表示
  ・arjs            : AR.js 設定
  ・vr-mode-ui      : VRボタン非表示
-->
<a-scene
  id="ar-scene"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; precision: medium;"
  vr-mode-ui="enabled: false"
  style="display:none;"
>
  <!--
    Hiro マーカー
    マーカーが検出されると中の要素が表示される
  -->
  <a-marker id="hiro-marker" preset="hiro">
    <!--
      プレースホルダー形状コンテナ
      JS から形状・色を動的に設定する
    -->
    <a-entity id="ar-character-container"></a-entity>

    <!-- マーカー上の発光リング -->
    <a-circle
      color="#5C6BC0"
      opacity="0.25"
      radius="0.65"
      rotation="-90 0 0"
      position="0 0.01 0"
    ></a-circle>
    <a-circle
      color="#5C6BC0"
      opacity="0.1"
      radius="0.85"
      rotation="-90 0 0"
      position="0 0.005 0"
    ></a-circle>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script src="js/stamps-config.js"></script>
<script src="js/app.js"></script>
<script>
  // ---- 初期化 ----
  document.addEventListener('DOMContentLoaded', () => {
    const id      = getStampIdFromURL();
    const errorEl = document.getElementById('ar-error');
    const errMsg  = document.getElementById('ar-error-msg');
    const loading = document.getElementById('ar-loading');
    const modal   = document.getElementById('marker-modal');

    // ID チェック
    if (!id || !getStampById(id)) {
      loading.style.display = 'none';
      errorEl.classList.add('show');
      return;
    }

    // 未取得チェック
    if (!isStampCollected(id)) {
      loading.style.display = 'none';
      errMsg.textContent = 'このスタンプはまだ取得されていません。\nQRコードをスキャンしてください。';
      errorEl.classList.add('show');
      return;
    }

    const stamp = getStampById(id);

    // モーダルのプレビューをスタンプに合わせて設定
    document.getElementById('modal-title').textContent
      = `${stamp.emoji} ${stamp.name} をARで見る`;
    const iconEl = document.getElementById('modal-shape-icon');
    iconEl.textContent = stamp.emoji;
    iconEl.style.background = stamp.color + '33'; // 20% opacity
    iconEl.style.border = `2px solid ${stamp.color}`;

    const hintEl = document.getElementById('modal-shape-hint');
    hintEl.textContent = stamp.model
      ? `🎮 仮オブジェクト: ${stamp.placeholder.label}（.glb 配置後にキャラクターに変わります）`
      : `🎮 仮オブジェクト: ${stamp.placeholder.label}`;

    // ロード完了 → モーダル表示
    setTimeout(() => {
      loading.style.display = 'none';
      modal.classList.remove('hidden');
    }, 700);

    // 「ARを開始する」ボタン
    document.getElementById('btn-start-ar').addEventListener('click', () => {
      modal.classList.add('hidden');
      startAR(stamp);
    });
  });

  // ---- AR 開始 ----
  function startAR(stamp) {
    const scene     = document.getElementById('ar-scene');
    const overlay   = document.getElementById('ar-overlay');
    const backBtn   = document.getElementById('ar-back');
    const indicator = document.getElementById('scanning-indicator');

    scene.style.display = 'block';
    overlay.classList.remove('hidden');
    backBtn.classList.remove('hidden');
    indicator.classList.remove('hidden');

    // 下部テキスト設定
    document.getElementById('ar-title').textContent
      = `${stamp.emoji} ${stamp.name}`;
    document.getElementById('ar-shape-label').textContent
      = `仮オブジェクト: ${stamp.placeholder.label}`;

    if (scene.hasLoaded) {
      buildCharacter(stamp);
    } else {
      scene.addEventListener('loaded', () => buildCharacter(stamp));
    }

    // マーカー検出イベント
    const marker = document.getElementById('hiro-marker');
    marker.addEventListener('markerFound', () => {
      const dot  = document.getElementById('scan-dot');
      const text = document.getElementById('scan-text');
      if (dot)  dot.classList.add('found');
      if (text) text.textContent = 'マーカー検出！';
    });
    marker.addEventListener('markerLost', () => {
      const dot  = document.getElementById('scan-dot');
      const text = document.getElementById('scan-text');
      if (dot)  dot.classList.remove('found');
      if (text) text.textContent = 'マーカーを探しています';
    });
  }

  // ---- プレースホルダー形状をシーンに生成 ----
  function buildCharacter(stamp) {
    const container = document.getElementById('ar-character-container');
    if (!container) return;

    // 既存の子要素をクリア
    container.innerHTML = '';

    const ph = stamp.placeholder;
    const glbPath = stamp.model;

    // .glb ファイルが存在するか HEAD リクエストで確認
    checkFileExists(glbPath).then((exists) => {
      if (exists) {
        // GLB が存在する → gltf-model エンティティを生成
        const entity = document.createElement('a-entity');
        entity.setAttribute('gltf-model', `url(${glbPath})`);
        entity.setAttribute('scale', stamp.modelScale);
        entity.setAttribute('position', stamp.modelPosition);
        entity.setAttribute('rotation', stamp.modelRotation);
        entity.setAttribute('animation',
          'property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear;');
        container.appendChild(entity);
      } else {
        // GLB が存在しない → プレースホルダー形状を表示
        buildPlaceholder(container, ph);
      }
    });
  }

  function buildPlaceholder(container, ph) {
    // メイン形状
    const shape = document.createElement(ph.shape);
    shape.setAttribute('color', ph.color);
    shape.setAttribute('scale', ph.scale);
    shape.setAttribute('position', ph.position);
    shape.setAttribute('roughness', '0.3');
    shape.setAttribute('metalness', '0.2');
    // Y軸回転アニメーション
    shape.setAttribute('animation__rot',
      'property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear;');
    // 上下に浮遊するアニメーション
    const baseY = parseFloat(ph.position.split(' ')[1]);
    shape.setAttribute('animation__float',
      `property: position; from: ${ph.position}; to: 0 ${baseY + 0.08} 0; ` +
      'dir: alternate; loop: true; dur: 1800; easing: easeInOutSine;');
    container.appendChild(shape);

    // 影リング（地面エフェクト）
    const shadow = document.createElement('a-circle');
    shadow.setAttribute('color', ph.color);
    shadow.setAttribute('opacity', '0.18');
    shadow.setAttribute('radius', '0.28');
    shadow.setAttribute('rotation', '-90 0 0');
    shadow.setAttribute('position', '0 0.01 0');
    container.appendChild(shadow);
  }

  // ---- ファイル存在確認 ----
  function checkFileExists(path) {
    return fetch(path, { method: 'HEAD' })
      .then((r) => r.ok)
      .catch(() => false);
  }
</script>
</body>
</html>

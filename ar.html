<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <title>キャラクター - スタンプラリー</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #0d0d1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: white;
    }

    /* ── ヘッダー ── */
    .char-header {
      width: 100%;
      background: rgba(255,255,255,0.05);
      padding: max(14px, env(safe-area-inset-top)) 16px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .btn-back-header {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .header-title {
      font-size: 1rem;
      font-weight: 700;
      opacity: 0.9;
    }

    /* ── メインコンテンツ ── */
    .char-main {
      width: 100%;
      max-width: 480px;
      padding: 32px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    /* ── スタンプGETバッジ ── */
    .get-badge {
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      color: white;
      font-size: 0.85rem;
      font-weight: 900;
      padding: 6px 20px;
      border-radius: 999px;
      letter-spacing: 0.06em;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .get-badge.hidden { display: none; }

    /* ── キャラクター画像 ── */
    .char-img-wrap {
      width: min(72vw, 280px);
      height: min(72vw, 280px);
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid #5C6BC0;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      box-shadow: 0 0 60px rgba(92,107,192,0.4);
      animation: floatIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .char-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes floatIn {
      0%   { transform: translateY(30px) scale(0.85); opacity: 0; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── テキスト ── */
    .char-name {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .char-subtitle {
      font-size: 0.9rem;
      opacity: 0.75;
      margin-top: -8px;
    }
    .char-desc {
      font-size: 0.88rem;
      line-height: 1.7;
      opacity: 0.7;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px 16px;
    }

    /* ── ボタン ── */
    .btn-home {
      display: block;
      width: 100%;
      max-width: 320px;
      background: #5C6BC0;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(92,107,192,0.5);
    }
    .btn-scan {
      display: block;
      width: 100%;
      max-width: 320px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    /* ── エラー ── */
    #char-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }
    #char-error.show { display: flex; }
    #char-error h2  { font-size: 1.2rem; }
    #char-error p   { font-size: 0.88rem; opacity: 0.75; line-height: 1.6; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="char-header">
  <a href="index.html" class="btn-back-header">&#8592; スタンプ帳</a>
  <span class="header-title" id="header-title">キャラクター</span>
</header>

<!-- メインコンテンツ -->
<main class="char-main" id="char-main">

  <!-- スタンプGETバッジ（新規取得時） -->
  <div class="get-badge hidden" id="get-badge">&#127881; スタンプGET！</div>

  <!-- キャラクター画像 -->
  <div class="char-img-wrap" id="char-img-wrap">
    <span id="char-emoji-fallback"></span>
  </div>

  <!-- テキスト -->
  <p class="char-name"     id="char-name"></p>
  <p class="char-subtitle" id="char-subtitle"></p>
  <p class="char-desc"     id="char-desc"></p>

  <!-- ボタン -->
  <a href="index.html" class="btn-home">&#127381; スタンプ帳を見る</a>
  <a href="scan.html"  class="btn-scan">&#128247; 次のQRをスキャン</a>

</main>

<!-- エラー -->
<div id="char-error">
  <h2>&#9888;&#65039; エラー</h2>
  <p id="char-error-msg">無効なスタンプIDです。<br>スタンプ帳から開いてください。</p>
  <a href="index.html" class="btn-home">スタンプ帳へ戻る</a>
</div>

<script src="js/stamps-config.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const id      = getStampIdFromURL();
    const errorEl = document.getElementById('char-error');
    const mainEl  = document.getElementById('char-main');

    if (!id || !getStampById(id)) {
      mainEl.style.display = 'none';
      errorEl.classList.add('show');
      return;
    }

    const stamp = getStampById(id);
    const isNew = collectStamp(id);

    // ヘッダータイトル
    document.getElementById('header-title').textContent = stamp.name;

    // スタンプGETバッジ
    if (isNew) {
      document.getElementById('get-badge').classList.remove('hidden');
    }

    // キャラクター画像
    const wrap = document.getElementById('char-img-wrap');
    wrap.style.borderColor = stamp.color;
    wrap.style.boxShadow   = `0 0 60px ${stamp.color}66`;
    wrap.style.background  = stamp.color + '18';
    wrap.innerHTML = '';  // クリア

    if (stamp.image) {
      const img = document.createElement('img');
      img.src   = stamp.image;
      img.alt   = stamp.name;
      img.onerror = () => {
        wrap.innerHTML = '';
        const span = document.createElement('span');
        span.textContent = stamp.emoji;
        span.style.fontSize = '6rem';
        wrap.appendChild(span);
      };
      wrap.appendChild(img);
    } else {
      const span = document.createElement('span');
      span.textContent = stamp.emoji;
      span.style.fontSize = '6rem';
      wrap.appendChild(span);
    }

    // テキスト
    document.getElementById('char-name').textContent     = stamp.name;
    document.getElementById('char-subtitle').textContent = stamp.subtitle;
    document.getElementById('char-desc').textContent     = stamp.description;
  });
</script>
</body>
</html>

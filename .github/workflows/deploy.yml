name: GitHub Pages デプロイ

on:
  push:
    branches:
      - main   # main ブランチへのプッシュで自動デプロイ

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pages を設定
        uses: actions/configure-pages@v4

      - name: 静的ファイルをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # リポジトリルートをそのまま公開

      - name: Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4

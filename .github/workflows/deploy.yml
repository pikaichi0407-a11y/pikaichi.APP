name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages デプロイに必要な最小限の権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐ
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── ビルド（ファイルをアーティファクトに固める）──
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # リポジトリルートをそのまま公開

  # ── デプロイ ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

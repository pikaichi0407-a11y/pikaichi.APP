<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタンプQRコード一覧（印刷用）</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #212121;
    }

    .page-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #3949AB;
    }
    .page-sub {
      text-align: center;
      font-size: 0.85rem;
      color: #757575;
      margin-bottom: 24px;
    }

    .btn-print {
      display: block;
      margin: 0 auto 24px;
      background: #5C6BC0;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-back {
      display: block;
      margin: 0 auto 32px;
      text-align: center;
      color: #5C6BC0;
      font-size: 0.9rem;
    }

    /* QRカードグリッド */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .qr-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-top: 6px solid var(--card-color, #5C6BC0);
      break-inside: avoid;
    }

    .qr-card-emoji { font-size: 2.2rem; margin-bottom: 6px; }
    .qr-card-name  { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .qr-card-sub   { font-size: 0.78rem; color: #757575; margin-bottom: 14px; }

    .qr-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }
    .qr-wrap canvas,
    .qr-wrap img { border-radius: 8px; }

    .qr-url {
      font-size: 0.62rem;
      color: #9E9E9E;
      word-break: break-all;
      margin-top: 4px;
    }

    .spot-label {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--card-color, #5C6BC0);
      color: white;
      opacity: 0.85;
    }

    /* 印刷時 */
    @media print {
      body { background: white; padding: 10px; }
      .btn-print, .btn-back, .page-sub { display: none; }
      .qr-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .qr-card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

<h1 class="page-title">🗺️ スタンプラリー QRコード一覧</h1>
<p class="page-sub">各スポットに設置してください。スマホのカメラで読み取るとスタンプがGETできます！</p>

<button class="btn-print" onclick="window.print()">🖨️ 印刷する</button>
<a href="index.html" class="btn-back">← スタンプ帳に戻る</a>

<div class="qr-grid" id="qr-grid"></div>

<script src="js/stamps-config.js"></script>
<script>
  const BASE_URL = 'https://pikaichi0407-a11y.github.io/pikaichi.APP/stamp.html?id=';

  const COLORS = {
    1: '#1565C0',
    2: '#283593',
    3: '#0D47A1',
    4: '#B71C1C',
    5: '#E65100',
  };

  const grid = document.getElementById('qr-grid');

  STAMPS_CONFIG.forEach((stamp) => {
    const url = BASE_URL + stamp.id;
    const color = COLORS[stamp.id] || '#5C6BC0';

    // カード要素
    const card = document.createElement('div');
    card.className = 'qr-card';
    card.style.setProperty('--card-color', color);
    card.innerHTML = `
      <div class="qr-card-emoji">${stamp.emoji}</div>
      <div class="qr-card-name">スタンプ ${stamp.id}：${stamp.name}</div>
      <div class="qr-card-sub">${stamp.subtitle}</div>
      <div class="qr-wrap" id="qr-${stamp.id}"></div>
      <div class="qr-url">${url}</div>
      <div class="spot-label">スポット ${stamp.id}</div>
    `;
    grid.appendChild(card);

    // QR生成
    new QRCode(document.getElementById(`qr-${stamp.id}`), {
      text: url,
      width: 180,
      height: 180,
      colorDark: color,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  });
</script>
</body>
</html>
